<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .nb{
            margin-top: 20px;
            margin-left: 50px;
            color: grey;
            font-family: Verdana, Geneva, Tahoma, sans-serif;
        }
    </style>
</head>
<body>
    <section class="wholeBody">
        <div class="mobile">
            <label for="day" class="label1">DAY</label>
            <label for="month">MONTH</label>
            <label for="year" class="yearx">YEAR</label><br>
            <input type="text" id="day" class="input1" placeholder="DD">
            <input type="text" id="month" class="input2" placeholder="MM">
            <input type="text" id="year" class="input3" placeholder="YYYY">
            <div class="field">
                <p class="thaday">This field is required</p>
                <p class="thamonth">This field is required</p>
                <p class="thayear">This field is required</p>
            </div>
            <div class="valid">
                <p class="thatday">Must be a valid day</p>
                <p class="thatmonth">Must be a valid month</p>
                <p class="thatyear">Must be a valid time/in the past</p>
            </div>
            <div class="linenimg">
                <div class="line"></div>
                <div class="imgofarrow">
                    <img src="./assets/images/icon-arrow.svg" alt="icon-arrow">
                </div>
            </div>
            <span class="spanit"><p class="anotherdash first">--</p><p>Years</p></span>
            <span class="spanit"><p class="anotherdash second">--</p><p>Months</p></span>
            <span class="spanit"><p class="anotherdash third">--</p><p>Days</p></span>
            <p class="nb">NB: 1 month = 30 days</p>
        </div>
    </section>
    <script src="script.js"></script>
</body>
</html>
